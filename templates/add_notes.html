<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Study Materials</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .form-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
      }
      .form-group label {
        margin-bottom: 8px;
        font-weight: 500;
        color: #374151;
        font-size: 14px;
      }
      .form-group input,
      .form-group select {
        padding: 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        background: #fff;
      }
      .form-group.full-width {
        grid-column: 1 / -1;
      }
      .submit-btn {
        width: 100%;
        padding: 15px;
        background: #0b6ed8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 20px;
      }
      .submit-btn:hover {
        background: #015dc0;
      }
      .submit-btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }
      .success-message {
        display: none;
        color: #10b981;
        text-align: center;
        margin-top: 15px;
        font-weight: 600;
        font-size: 16px;
        background: #ecfdf5;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #10b981;
      }
    </style>
  </head>
  <body style="background-image: url('/static/clg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; height: 100vh; margin: 0; padding: 0;">
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
      <div style="width: 95%; max-width: 700px; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); font-family: 'Segoe UI', sans-serif; position: relative;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
          <h2 style="margin: 0; color: #1f2937; font-size: 24px;">Add Study Materials</h2>
          <button id="close-btn" style="background: none; border: none; font-size: 24px; color: #6b7280; cursor: pointer; padding: 4px 8px; border-radius: 50%; transition: all 0.2s;" onmouseover="this.style.background='#f3f4f6'; this.style.color='#374151';" onmouseout="this.style.background='none'; this.style.color='#6b7280';" title="Close">×</button>
        </div>
        
        <form id="add-notes-form">
          <div class="form-container">
            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" required />
            </div>
            
            <div class="form-group">
              <label for="department">Department</label>
              <select id="department" required>
                <option value="">Select Department</option>
                <option value="electronics and communication engineering">Electronics and Communication Engineering</option>
                <option value="Computer Science and Engineering">Computer Science and Engineering</option>
                <option value="Mechanical Engineering">Mechanical Engineering</option>
                <option value="Civil Engineering">Civil Engineering</option>
                <option value="electrical and electronics engineering">Electrical and Electronics Engineering</option>
                <option value="industrial engineering and management">industrial engineering and management</option>
                <option value="electronics and instrumentation engineering">electronics and instrumentation engineering</option>
                <option value="electronics and telecommunication engineering">electronics and telecommunication engineering</option>
                <option value="information science and engineering">information science and engineering</option>
                <option value="medical electronics engineering">medical electronics engineering</option>
                <option value="computer science and business systems">computer science and business systems</option>
                <option value="artificial intelligence and machine learning">artificial intelligence and machine learning</option>
                <option value="aeronautical engineering">aeronautical engineering</option>
                <option value="business administration">MBA</option>
                <option value="computer applications">MCA</option>
                <option value="mathematics">mathematics</option>
                <option value="physics">physics</option>
                <option value="chemistry">chemistry</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="semester">Semester</label>
              <select id="semester" required>
                <option value="">Select Semester</option>
                <option value="1">1st Semester</option>
                <option value="2">2nd Semester</option>
                <option value="3">3rd Semester</option>
                <option value="4">4th Semester</option>
                <option value="5">5th Semester</option>
                <option value="6">6th Semester</option>
                <option value="7">7th Semester</option>
                <option value="8">8th Semester</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="subject-name">Subject Name</label>
              <input type="text" id="subject-name" placeholder="Enter subject name" required />
            </div>
            
            <div class="form-group full-width">
              <label for="link">Link</label>
              <input type="url" id="link" placeholder="https://example.com/study-material" required />
            </div>
          </div>
          
          <button type="submit" class="submit-btn">Add Study Material</button>
        </form>
        
        <div id="success-message" class="success-message">
          ✅ Successfully uploaded!
        </div>
      </div>
    </div>

    <script>
      // Wait for DOM to be fully loaded
      document.addEventListener('DOMContentLoaded', function() {
        // Get faculty email from localStorage
        const authUser = JSON.parse(localStorage.getItem('authUser') || 'null');
        if (!authUser || authUser.role !== 'faculty') {
          alert('Access denied. Faculty login required.');
          window.location.href = '/';
          return;
        }

        // Set today's date as default
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // Test API connectivity
        console.log('Testing API connectivity...');
        fetch('/api/add-study-material', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({}) })
          .then(response => console.log('API endpoint accessible, status:', response.status))
          .catch(error => console.error('API endpoint not accessible:', error));

        // Close button functionality
        document.getElementById('close-btn').addEventListener('click', function(){
          console.log('Close button clicked'); // Debug log
          window.location.href = '/';
        });

      // Form submission
      document.getElementById('add-notes-form').addEventListener('submit', async function(e){
        e.preventDefault();
        
        // Disable submit button to prevent double submission
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Uploading...';
        
        const formData = {
          date: document.getElementById('date').value,
          department: document.getElementById('department').value,
          semester: parseInt(document.getElementById('semester').value),
          subject_name: document.getElementById('subject-name').value.trim(),
          link: document.getElementById('link').value.trim(),
          faculty_email: authUser.email
        };

        console.log('Sending data:', formData); // Debug log

        try {
          console.log('Making API request to /api/add-study-material');
          const response = await fetch('/api/add-study-material', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
          });
          
          console.log('Response status:', response.status);
          console.log('Response headers:', response.headers);
          
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json();
          console.log('Response data:', data);
          
          if (data.success) {
            document.getElementById('success-message').style.display = 'block';
            document.getElementById('add-notes-form').reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            
            setTimeout(() => {
              document.getElementById('success-message').style.display = 'none';
            }, 3000);
          } else {
            alert(`Error: ${data.message}`);
          }
        } catch (error) {
          console.error('Detailed error:', error);
          console.error('Error stack:', error.stack);
          alert(`Failed to add study material: ${error.message}`);
        } finally {
          // Re-enable submit button
          submitBtn.disabled = false;
          submitBtn.textContent = 'Add Study Material';
        }
      });
      }); // End of DOMContentLoaded
    </script>
  </body>
</html>
