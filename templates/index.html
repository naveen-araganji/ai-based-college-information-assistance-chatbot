<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>College Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/styles.css" />
    
  </head>
  <body>
    <!-- === Chatbot Toggle Button === -->
    <button id="chatbot-toggle">virtual assistant <img src="/static/download.png" alt="photo" width="120px"></button>


    <!-- === Chatbot Container === -->
    <div id="chatbot-container">
      <div id="chatbot-header">
        <span>Virtual assistant</span>
        <div id="header-controls">
          <span id="role-badge">Guest</span>
          <button id="login-btn" title="Login">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" height="18" width="18" aria-hidden="true"><path fill="currentColor" d="M160 352c0-17.7 14.3-32 32-32h64V192H192c-17.7 0-32-14.3-32-32s14.3-32 32-32h80 16c26.5 0 48 21.5 48 48V368c0 26.5-21.5 48-48 48H192c-17.7 0-32-14.3-32-32zM64 256c0-106 86-192 192-192s192 86 192 192s-86 192-192 192S64 362 64 256z"/></svg>
          </button>
        </div>
      </div>
      <div id="chatbot-messages"></div>
      <div id="chatbot-input-area">
        <button id="mic-btn" title="Speak"><span><svg viewBox="0 0 384 512" height="1em" xmlns="http://www.w3.org/2000/svg" class="microphone"><path d="M192 0C139 0 96 43 96 96V256c0 53 43 96 96 96s96-43 96-96V96c0-53-43-96-96-96zM64 216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 89.1 66.2 162.7 152 174.4V464H120c-13.3 0-24 10.7-24 24s10.7 24 24 24h72 72c13.3 0 24-10.7 24-24s-10.7-24-24-24H216V430.4c85.8-11.7 152-85.3 152-174.4V216c0-13.3-10.7-24-24-24s-24 10.7-24 24v40c0 70.7-57.3 128-128 128s-128-57.3-128-128V216z"></path></svg></span></button>
        <input type="text" id="chatbot-input" placeholder="Type a message..." />
        <button id="send-btn" title="Send"><span>➤</span></button>
      </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="login-modal">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h2>Login</h2>
            <button id="close-login-btn" class="close-btn" title="Close">×</button>
          </div>
          <form id="login-form">
            <label for="login-role">Category</label>
            <select id="login-role" required>
              <option value="">Select Role</option>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
              <option value="admin">Admin</option>
            </select>
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="you@drait.edu.in" required />
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Password" required />
            <button type="submit" class="auth-btn">Login</button>
          </form>
          <p class="auth-note">No account? <a href="#" id="show-register">Register</a></p>
        </div>
      </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="login-modal">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h2>Register</h2>
            <button id="close-register-btn" class="close-btn" title="Close">×</button>
          </div>
          <form id="register-form">
            <label for="register-role">Category</label>
            <select id="register-role" required>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="User Name" required />
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="you@drait.edu.in" required />
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Password" required />
            <button type="submit" class="auth-btn">Create account</button>
          </form>
          <p class="auth-note">Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>
      </div>
    </div>

<script src="/static/script.js"> </script>
  </body>
</html>
